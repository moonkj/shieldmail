name = "shieldmail-email-router"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "api.shldmail.work/*", zone_name = "shldmail.work" }
]

# Email Routing: bind incoming MX to this worker.
# Catch-all on d1-d5.shldmail.work routes all inbound mail here.
# Email handler is `export default { email(...) }` in src/index.ts.

# ─────────────────────────────────────────────
# KV: alias index
# ─────────────────────────────────────────────
# Replace `id` and `preview_id` before deploy.
[[kv_namespaces]]
binding = "ALIAS_KV"
id = "996d9716e4774458994c57c281d99f1a"
preview_id = "fe0a2777f04b4a548f7b2b3f068d9b97"

# ─────────────────────────────────────────────
# Durable Objects
# ─────────────────────────────────────────────
[[durable_objects.bindings]]
name = "MSG_DO"
class_name = "AliasChannel"

[[durable_objects.bindings]]
name = "RATE_LIMIT"
class_name = "TokenBucket"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AliasChannel", "TokenBucket"]

# ─────────────────────────────────────────────
# Vars (non-secret)
# ─────────────────────────────────────────────
[vars]
DOMAIN_POOL = "shldmail.work"
MESSAGE_TTL_MS = "600000"
EPHEMERAL_ALIAS_TTL_SEC = "3600"
POLL_TOKEN_TTL_SEC = "7200"

# ─────────────────────────────────────────────
# Secrets (set via `wrangler secret put`)
#   HMAC_KEY    — JWT + alias hash signing key
#   SENTRY_DSN  — optional, M4
# ─────────────────────────────────────────────
# (declared in code via Env type; do not put values here)

# Routes are declared at top level (above [vars]).

[observability]
enabled = true
